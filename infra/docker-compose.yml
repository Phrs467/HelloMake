version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bellamake-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bella123}
      POSTGRES_DB: ${POSTGRES_DB:-bellamake_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bellamake-network

  redis:
    image: redis:7-alpine
    container_name: bellamake-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bellamake-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bellamake-api
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-bella123}@db:5432/${POSTGRES_DB:-bellamake_db}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-supersecret}
    networks:
      - bellamake-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bellamake-web
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api/v1
    networks:
      - bellamake-network

  nginx:
    image: nginx:alpine
    container_name: bellamake-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - bellamake-network

volumes:
  postgres_data:
  redis_data:

networks:
  bellamake-network:
    driver: bridge
